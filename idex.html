<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Arcade Synthesizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', cursive; background-color: #000; color: #ffeb3b; }
        .arcade-btn { transition: all 0.1s; border: 4px solid #2196f3; }
        .active { transform: scale(0.95); background-color: #ffeb3b !important; color: #000 !important; box-shadow: 0 0 20px #ffeb3b; }
        .maze-border { border: 2px solid #2196f3; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <h1 class="text-2xl md:text-4xl mb-8 tracking-widest text-yellow-400 animate-pulse">PAC-MAN SINT</h1>
    
    <div class="grid grid-cols-2 gap-6 p-8 maze-border rounded-lg bg-slate-900 shadow-[0_0_30px_rgba(33,150,243,0.3)]">
        <div id="key-arrowup" class="arcade-btn w-24 h-24 flex items-center justify-center rounded-xl cursor-pointer bg-slate-800 hover:bg-slate-700">▲</div>
        <div id="key-arrowleft" class="arcade-btn w-24 h-24 flex items-center justify-center rounded-xl cursor-pointer bg-slate-800 hover:bg-slate-700 font-bold text-xs text-center">◀<br>(TRÍADE)</div>
        <div id="key-arrowdown" class="arcade-btn w-24 h-24 flex items-center justify-center rounded-xl cursor-pointer bg-slate-800 hover:bg-slate-700">▼</div>
        <div id="key-arrowright" class="arcade-btn w-24 h-24 flex items-center justify-center rounded-xl cursor-pointer bg-slate-800 hover:bg-slate-700">▶</div>
    </div>

    <p class="mt-8 text-blue-500 text-sm">Use o Makey Makey ou as Setas do Teclado</p>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Mapeamento das frequências das Setas (ArrowUp, ArrowLeft, ArrowDown, ArrowRight)
        const NOTES = {
            'arrowup': [261.63], 
            'arrowdown': [329.63], 
            'arrowright': [392.00],
            'arrowleft': [261.63, 329.63, 392.00] // Tríade Dó Maior
        };

        function playNote(freqs) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            freqs.forEach(f => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(f, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            });
        }

        function handleInput(key) {
            const el = document.getElementById(`key-${key.toLowerCase()}`);
            if (el) {
                el.classList.add('active');
                playNote(NOTES[key.toLowerCase()] || []);
                setTimeout(() => el.classList.remove('active'), 200);
            }
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
                handleInput(key);
            }
        });

        document.querySelectorAll('.arcade-btn').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                const key = btn.id.split('-')[1];
                handleInput(key);
            });
        });
    </script>
</body>
</html>
